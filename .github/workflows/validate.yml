name: dbt CI -- Validate Gold Models

on:
  workflow_dispatch:

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: Write Snowflake private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_rsa_key.p8

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          energy_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                authenticator: snowflake_jwt
                private_key_path: /tmp/snowflake_rsa_key.p8
                role: ACCOUNTADMIN
                database: ENERGY_PIPELINE
                warehouse: ENERGY_WH
                schema: GOLD
                threads: 4
          EOF

      - name: Run dbt tests
        working-directory: energy_dbt
        run: |
          dbt deps
          dbt test