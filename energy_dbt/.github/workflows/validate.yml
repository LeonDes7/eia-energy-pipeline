name: Data Quality Validation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install deltalake pyarrow great_expectations python-dotenv pandas

      - name: Run Bronze validation
        run: python great_expectations/validate_bronze.py
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      - name: Run Silver validation
        run: python great_expectations/validate_silver.py
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}